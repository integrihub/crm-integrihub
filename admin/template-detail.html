<!DOCTYPE html>
<html>
<head>
  <title>Template Detail</title>
  <link rel="icon" href="https://cdn.phototourl.com/free/2026-04-17-34afdbc3-383e-4a83-bee6-d9afb83d3bb6.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <script>
  (function(){
    const theme = localStorage.getItem("theme") || "system";

    if(theme === "dark"){
      document.documentElement.classList.add("dark");
    }
    else if(theme === "light"){
      document.documentElement.classList.remove("dark");
    }
    else {
      if(window.matchMedia('(prefers-color-scheme: dark)').matches){
        document.documentElement.classList.add("dark");
      }
    }
  })();
  </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-black dark:text-white" onload="init('template')">
  
<!-- TOP BAR -->
<div class="fixed top-0 left-0 w-full z-50 flex justify-between items-center p-3 bg-white dark:bg-gray-800 shadow">

  <div class="flex items-center gap-2">
    <img id="logo" class="h-8 rounded">
    <div>
      <div id="clientName" class="font-bold"></div>
      <div class="text-xs text-gray-400">Admin</div>
    </div>
  </div>

  <div class="relative">
    <div onclick="toggleProfile()" class="flex items-center gap-2 cursor-pointer">
      <div id="avatarCircle" class="w-8 h-8 rounded-full bg-yellow-400 flex items-center justify-center text-white font-bold"></div>
      <div class="text-sm">
        <div id="profileName" class="font-semibold"></div>
        <div id="profileEmail" class="text-gray-400 text-xs"></div>
      </div>
    </div>

    <div id="profileMenu" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 border rounded shadow p-2">
      <p class="text-xs text-gray-400 mb-1">Mode</p>

      <button onclick="setTheme('light')" class="block w-full text-left p-1">☀️ Light</button>
      <button onclick="setTheme('dark')" class="block w-full text-left p-1">🌙 Dark</button>
      <button onclick="setTheme('system')" class="block w-full text-left p-1">💻 System</button>

      <hr class="my-2">
      <button onclick="logout()" class="text-red-500 text-sm w-full text-left">Logout</button>
    </div>
  </div>

</div>

        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>

Chatbot Settings

    Account & Webhooks
</button>
    </div>

    <div>
      <button onclick="logout()" class="w-full flex items-center justify-center bg-red-50 text-red-600 border border-red-200 dark:bg-red-900/20 dark:border-red-800 dark:text-red-400 py-2 rounded-lg mt-4 shadow-sm font-bold hover:bg-red-100 dark:hover:bg-red-900/50 transition duration-200 ease-in-out">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>

      <div class="text-center mt-4 text-[10px] text-gray-400 dark:text-gray-500">

</div>


  <!-- CONTENT -->
  <div class="flex-1 ml-64 p-4 mt-[60px] overflow-y-auto h-[calc(100vh-60px)]">

    <!-- BACK -->

      class="mb-4 bg-gray-300 px-3 py-1 rounded">
      ← Back

    <div class="grid grid-cols-2 gap-6">

      <!-- PREVIEW KIRI -->

  <div class="w-[320px] bg-[#111b21] p-3 rounded-xl shadow-lg">

    <!-- HEADER WA -->

      <div class="w-8 h-8 bg-gray-500 rounded-full"></div>
      <div>
        <div class="text-white text-sm font-semibold">Preview</div>
        <div class="text-xs text-gray-400">online</div>
      </div>
    </div>

    <!-- CHAT -->
    <div id="previewBox" class="flex flex-col gap-2"></div>

  </div>

</div>

      <!-- 🔥 DETAIL (KANAN) -->

        <!-- TITLE -->

        <!-- META -->

          <div><b>Language:</b> <span id="dLang"></span></div>

            </span>
          </div>
        </div>

        <hr class="my-3">

        <!-- HEADER -->

          <b>Header</b>
          <div id="dHeaderBox" class="mt-2"></div>

          <a id="mediaLink"
            target="_blank"
            class="text-blue-500 text-sm underline hidden">
            Open Media Link
          </a>
        </div>

        <hr class="my-3">

        <!-- BODY -->
        <div>
          <b>Body</b>
          <div id="dBody"
            class="bg-gray-100 dark:bg-gray-700 p-2 rounded mt-1 text-sm">
          </div>
        </div>

        <!-- FOOTER -->
        <div class="mt-3">
          <b>Footer</b>
          <div id="dFooter"
            class="text-sm text-gray-500 dark:text-gray-300">
          </div>
        </div>

        <!-- BUTTONS -->
        <div class="mt-4">
          <b>Buttons</b>
          <div id="dButtonsBox" class="mt-2 space-y-2"></div>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="/app.js?v=2"></script>

</body>
</html>
