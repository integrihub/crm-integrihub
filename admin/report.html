<!DOCTYPE html>
<html>
<head>
  <title>Report Dashboard - IntegriHub</title>
  <link rel="icon" href="https://cdn.phototourl.com/free/2026-04-17-34afdbc3-383e-4a83-bee6-d9afb83d3bb6.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script>
  (function(){
    const theme = localStorage.getItem("theme") || "system";
    if(theme === "dark") document.documentElement.classList.add("dark");
    else if(theme === "light") document.documentElement.classList.remove("dark");
    else if(window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add("dark");
  })();
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-black dark:text-white" onload="init('report'); initReportDashboard();">

<div class="fixed top-0 left-0 w-full z-50 flex justify-between items-center p-3 bg-white dark:bg-gray-800 shadow">
  
  <div class="flex items-center gap-2">
    <img id="logo" class="h-8 rounded">
    <div>
      <div id="clientName" class="font-bold"></div>
      <div class="text-xs text-gray-400">Admin</div>
    </div>
  </div>

  <div class="relative">
    <div onclick="toggleProfile()" class="flex items-center gap-2 cursor-pointer">
      <div id="avatarCircle" class="w-8 h-8 rounded-full bg-yellow-400 flex items-center justify-center text-white font-bold"></div>
      <div class="text-sm">
        <div id="profileName" class="font-bold"></div>
        <div id="profileEmail" class="text-gray-400 text-xs"></div>
      </div>
    </div>
    
    <div id="profileMenu" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 border rounded shadow p-2 z-50">
      <p class="text-xs text-gray-400 mb-1">Mode</p>
      <button onclick="setTheme('light')" class="block w-full text-left p-1 hover:bg-gray-100 dark:hover:bg-gray-700">☀️ Light</button>
      <button onclick="setTheme('dark')" class="block w-full text-left p-1 hover:bg-gray-100 dark:hover:bg-gray-700">🌙 Dark</button>
      <button onclick="setTheme('system')" class="block w-full text-left p-1 hover:bg-gray-100 dark:hover:bg-gray-700">💻 System</button>
      <hr class="my-2">
      <button onclick="logout()" class="text-red-500 text-sm w-full text-left p-1 hover:bg-gray-100 dark:hover:bg-gray-700">Logout</button>
    </div>
  </div>

</div>

<div class="flex">
 <div class="w-64 flex-none bg-white dark:bg-gray-800 shadow border-r dark:border-gray-700 p-4 fixed top-[60px] left-0 h-[calc(100vh-60px)] overflow-y-auto z-40 flex flex-col justify-between">
    
    <div>
      <button id="menuDashboard" onclick="location.href='dashboard.html'" class="flex items-center w-full text-left px-4 py-2.5 rounded-lg mb-2 bg-transparent text-gray-600 dark:text-gray-300 hover:text-blue-600 hover:bg-transparent dark:hover:text-blue-400 dark:hover:bg-transparent transition duration-200 ease-in-out font-medium">

        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>

        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        Report
      </button>

      <button id="menuSettings" onclick="location.href='settings.html'" class="flex items-center w-full text-left px-4 py-2.5 rounded-lg mb-2 bg-transparent text-gray-600 dark:text-gray-300 hover:text-blue-600 hover:bg-transparent dark:hover:text-blue-400 dark:hover:bg-transparent transition duration-200 ease-in-out font-medium">
          <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="4" y="8" width="16" height="12" rx="2" ry="2"></rect>

</svg>
Chatbot Settings
</button>

      <button id="menuAccount" onclick="location.href='account.html'" class="flex items-center w-full text-left px-4 py-2.5 rounded-lg mb-2 bg-transparent text-gray-600 dark:text-gray-300 hover:text-blue-600 hover:bg-transparent dark:hover:text-blue-400 dark:hover:bg-transparent transition duration-200 ease-in-out font-medium">
    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>

    </svg>
    Account & Webhooks
</button>
    </div>

    <div>
      <button onclick="logout()" class="w-full flex items-center justify-center bg-red-50 text-red-600 border border-red-200 dark:bg-red-900/20 dark:border-red-800 dark:text-red-400 py-2 rounded-lg mt-4 shadow-sm font-bold hover:bg-red-100 dark:hover:bg-red-900/50 transition duration-200 ease-in-out">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>

      </button>
      <div class="text-center mt-4 text-[10px] text-gray-400 dark:text-gray-500">
        2026 © IntegriHub v1.0.0
      </div>

  </div>
  </div>
  
  <div class="flex-1 ml-64 p-6 mt-[60px] overflow-y-auto h-[calc(100vh-60px)]">
    <h2 class="text-2xl font-black mb-6 border-b pb-2 dark:border-gray-700">📂 Data Center & Reports</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <div class="bg-white dark:bg-gray-800 p-5 rounded-lg shadow border-t-4 border-blue-500">
        <h3 class="font-bold mb-3 flex items-center gap-2">🚀 Report Blasting</h3>
        
        <input id="blastSearchInput" placeholder="Cari nama template blasting..." class="w-full border p-2 mb-2 rounded dark:bg-gray-700 dark:border-gray-600 text-sm outline-none focus:border-blue-500">
        <div class="border dark:border-gray-600 rounded mb-3 bg-gray-50 dark:bg-gray-900">
          <label class="block p-2 border-b dark:border-gray-600 font-bold text-sm bg-gray-200 dark:bg-gray-700 cursor-pointer">
            <input type="checkbox" id="selectAllBlast" onclick="toggleAllTemplates('blast')" class="mr-2"> Semua Template
          </label>
          <div id="blastCheckboxList" class="h-32 overflow-y-auto"></div>
        </div>

        <div class="flex gap-2 mb-4">
          <input type="date" id="blastStart" class="w-1/2 border p-2 rounded dark:bg-gray-700 dark:border-gray-600 text-sm">
          <input type="date" id="blastEnd" class="w-1/2 border p-2 rounded dark:bg-gray-700 dark:border-gray-600 text-sm">
        </div>
        <button onclick="downloadReport('blast')" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 rounded transition">📥 Export Blasting CSV</button>
      </div>

     <div class="bg-white dark:bg-gray-800 p-5 rounded-lg shadow border-t-4 border-green-500">
        <h3 class="font-bold mb-3 flex items-center gap-2">↩️ Tracker Button (Quick Reply & List Buttons)</h3>

       <!--
        <input id="qrSearchInput" placeholder="Cari template quick reply..." class="w-full border p-2 mb-2 rounded dark:bg-gray-700 dark:border-gray-600 text-sm outline-none focus:border-green-500">
        <div class="border dark:border-gray-600 rounded mb-3 bg-gray-50 dark:bg-gray-900">
          <label class="block p-2 border-b dark:border-gray-600 font-bold text-sm bg-gray-200 dark:bg-gray-700 cursor-pointer">
            <input type="checkbox" id="selectAllQR" onclick="toggleAllTemplates('qr')" class="mr-2"> Semua Template Quick Reply
          </label>
          <div id="qrCheckboxList" class="h-32 overflow-y-auto"></div>
        </div>
       -->

        <div class="flex gap-2 mb-4">
          <input type="date" id="qrStart" class="w-1/2 border p-2 rounded dark:bg-gray-700 dark:border-gray-600 text-sm">
          <input type="date" id="qrEnd" class="w-1/2 border p-2 rounded dark:bg-gray-700 dark:border-gray-600 text-sm">
        </div>
        <button onclick="downloadReport('button')" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 rounded transition">📥 Export Button Tracker</button>
      </div>

     <div class="bg-white dark:bg-gray-800 p-5 rounded-lg shadow border-t-4 border-purple-500">
        <h3 class="font-bold mb-3 flex items-center gap-2">📋 Tracker Isian WhatsApp Flow</h3>
        
        <input id="flowSearchInput" placeholder="Cari template flow..." class="w-full border p-2 mb-2 rounded dark:bg-gray-700 dark:border-gray-600 text-sm outline-none focus:border-purple-500">
        <div class="border dark:border-gray-600 rounded mb-3 bg-gray-50 dark:bg-gray-900">
          <label class="block p-2 border-b dark:border-gray-600 font-bold text-sm bg-gray-200 dark:bg-gray-700 cursor-pointer">
            <input type="checkbox" id="selectAllFlow" onclick="toggleAllTemplates('flow')" class="mr-2"> Semua Template Flow
          </label>
          <div id="flowCheckboxList" class="h-32 overflow-y-auto"></div>
        </div>

        <div class="flex gap-2 mb-4">
          <input type="date" id="flowStart" class="w-1/2 border p-2 rounded dark:bg-gray-700 dark:border-gray-600 text-sm">
          <input type="date" id="flowEnd" class="w-1/2 border p-2 rounded dark:bg-gray-700 dark:border-gray-600 text-sm">
        </div>
        <button onclick="downloadReport('flow')" class="w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 rounded transition">📥 Export Flow Data</button>
      </div>

      <div class="bg-white dark:bg-gray-800 p-5 rounded-lg shadow border-t-4 border-orange-500">
        <h3 class="font-bold mb-3 flex items-center gap-2">💬 Full Chat Log & Agent Record</h3>
        <input id="chatSearch" placeholder="Cari nama atau nomor..." class="w-full border p-2 mb-2 rounded dark:bg-gray-700 dark:border-gray-600 text-sm">
        
        <div class="border dark:border-gray-600 rounded mb-3 bg-gray-50 dark:bg-gray-900">
          <label class="block p-2 border-b dark:border-gray-600 font-bold text-sm bg-gray-200 dark:bg-gray-700 cursor-pointer">
            <input type="checkbox" id="selectAllUsers" onclick="toggleAllUsers(this)" class="mr-2"> Semua User
          </label>
          <div id="userCheckboxList" class="h-32 overflow-y-auto"></div>
        </div>

        <div class="flex gap-2 mb-4">
          <input type="date" id="chatStart" class="w-1/2 border p-2 rounded dark:bg-gray-700 dark:border-gray-600 text-sm">
          <input type="date" id="chatEnd" class="w-1/2 border p-2 rounded dark:bg-gray-700 dark:border-gray-600 text-sm">
        </div>
        <button onclick="downloadReport('chatlog')" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 rounded transition">📥 Export Chat Logs</button>
      </div>

    </div>
  </div>
</div>

</html>
