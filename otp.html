<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>OTP Verification</title>
  <link rel="icon" href="https://cdn.phototourl.com/free/2026-04-22-44a947cb-fd19-4359-9e06-62ec369e0551.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex items-center justify-center relative overflow-hidden">

<!-- 🔥 BACKGROUND IMAGE -->
<div class="absolute inset-0">
  <img src="https://cdn.phototourl.com/free/2026-06-10-47898f95-a81a-4993-b770-a17a2713706a.png"
       class="w-full h-full object-cover">
  <div class="absolute inset-0 bg-black/60"></div>
</div>

<!-- LOGO KIRI ATAS -->
<img src="https://cdn.phototourl.com/free/2026-05-02-ab097072-d91f-49c4-a043-141626c5b8a8.png" 
     class="absolute top-10 left-12 h-20 z-10">
  
<!-- CARD -->
<div class="bg-white/10 backdrop-blur-lg p-8 rounded-2xl shadow-xl w-[350px] z-10 border border-white/20">

  <!-- TITLE -->
  <h1 class="text-xl font-semibold text-center text-white mb-1">
    Verifikasi OTP
  </h1>

  <h2 class="text-lg font-bold text-center text-green-400 mb-2">
    CRM IntegriHub
  </h2>

  <!-- SUBTEXT -->
  <p class="text-sm text-gray-300 text-center mb-6">
    Silakan masukkan kode OTP yang telah dikirim ke email Anda untuk melanjutkan proses login.
  </p>

  <!-- INPUT -->
  <input id="otp" placeholder="Masukkan OTP"
    class="w-full p-2 border border-white/30 bg-white/10 text-white rounded mb-4 text-center tracking-widest text-lg focus:outline-none focus:ring-2 focus:ring-green-400">

  <!-- BUTTON -->
  <button onclick="verify()"
    class="bg-green-500 hover:bg-green-600 transition text-white w-full py-2 rounded-lg">
    Verify
  </button>

</div>

<script>
const API = window.location.hostname.includes("staging") || 
            window.location.hostname.includes("pages.dev") || 
            window.location.hostname.includes("localhost") || 
            window.location.hostname.includes("127.0.0.1")
  ? "https://api-staging.crm.integrihub.my.id"
  : "https://api-crm.integrihub.my.id";

// 🔥 BISA TEKAN ENTER
document.addEventListener("keydown", function(event) {
  if (event.key === "Enter") verify();
});

async function verify(){
  const otpInput = document.getElementById("otp").value;
  const btn = document.querySelector("button");
  if (!otpInput) return alert("⚠️ Masukkan OTP!");

  btn.innerText = "⏳ Verifikasi...";
  btn.disabled = true;

  try {
    const res = await fetch(API+"/verify-otp", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ email:localStorage.getItem("email"), otp:otpInput })
    });

    const data = await res.json();

    if(!res.ok){
      alert("❌ OTP salah atau kadaluarsa");
      btn.innerText = "Verify";
      btn.disabled = false;
      return;
    }

    localStorage.setItem("role", data.role);
    localStorage.setItem("client_id", data.client_id);
    
    // 🔥 SIMPAN TOKEN UNTUK APP.JS & AGENT.HTML
    if (data.bearer_token) {
        localStorage.setItem("bearer_token", data.bearer_token);
    }

    window.location = "index.html";

  } catch(err){
    alert("❌ Server error");
    btn.innerText = "Verify";
    btn.disabled = false;
  }
}
</script>

<!-- FOOTER -->
<div class="fixed bottom-2 right-4 text-xs text-gray-300 z-10">
  2026 © Application designed and developed by IntegriHub v1.0.0
</div>

</body>
</html>
