<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  

  <script>
    // Fitur Otomatis Deteksi Root Path (Aman untuk Migrasi)
    const currentPath = window.location.pathname;
    const basePath = currentPath.includes("/crm-integrihub") ? "/crm-integrihub" : "";
    const role = localStorage.getItem("role");

    if (!role) {
      window.location.href = basePath + "/login.html";
    } 
    else if (role === "super_admin") {
      window.location.href = basePath + "/super-admin/home.html";
    } 
    else if (role === "admin") {
      window.location.href = basePath + "/admin/dashboard.html";
    } 
    else if (role === "agent") {
      window.location.href = basePath + "/agent.html";
    } 
    else {
      localStorage.clear();
      window.location.href = basePath + "/login.html";
    }
  </script>
</head>
<body>
</body>
</html>
