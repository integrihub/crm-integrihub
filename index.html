<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    const role = localStorage.getItem("role");

    if (!role) {
      window.location.href = "/login.html"; // ✅ Tambah slash
    } 
    else if (role === "super_admin") {
      window.location.href = "/super-admin/home.html"; // ✅ Tambah slash
    } 
    else if (role === "admin") {
      window.location.href = "/admin/dashboard.html"; // ✅ Tambah slash
    } 
    else if (role === "agent") {
      window.location.href = "/agent.html"; // ✅ Tambah slash
    } 
    else {
      // fallback kalau role aneh
      localStorage.clear();
      window.location.href = "/login.html"; // ✅ Tambah slash
    }
  </script>
</head>

<body>
</body>
</html>
