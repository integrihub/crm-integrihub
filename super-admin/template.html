<!DOCTYPE html>
<html>
<head>
  <title>Template Management</title>
  <link rel="icon" href="https://cdn.phototourl.com/free/2026-04-17-34afdbc3-383e-4a83-bee6-d9afb83d3bb6.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900">

<div class="flex flex-col md:flex-row min-h-screen">

  <!-- SIDEBAR -->
  <div class="w-full md:w-64 md:sticky md:top-0 md:h-screen overflow-y-auto bg-white dark:bg-gray-800 p-4 border-r border-gray-200 dark:border-gray-700 flex md:flex-col justify-between transition-colors z-20">
    <div>
      <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-8 flex items-center gap-2">
        <svg class="w-7 h-7 text-blue-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        Super Admin
      </h2>

      <p class="text-[11px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3 px-2">
        Menu Utama
      </p>

      <ul class="space-y-1">
        <li>
          <button onclick="location.href='home.html'"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-white font-medium text-sm whitespace-nowrap transition-colors">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            Home
          </button>
        </li>

        <li>
          <button onclick="location.href='create-client.html'"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-white font-medium text-sm whitespace-nowrap transition-colors">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
            Create Client
          </button>
        </li>

        <li>
          <button onclick="location.href='list-client.html'"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-white font-medium text-sm whitespace-nowrap transition-colors">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            List Client
          </button>
        </li>
        
        <li>
          <button onclick="location.href='template.html'" 
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 font-semibold text-sm whitespace-nowrap transition-colors">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"></path></svg>
            Template Management
          </button>
        </li>

        <li>
          <button onclick="location.href='audit-logs.html'" 
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-white font-medium text-sm whitespace-nowrap transition-colors">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            Audit Trail Logs
          </button>
        </li>
      </ul>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="flex-1 p-4 md:p-6">

    <!-- TOPBAR -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-xl font-semibold dark:text-white">Template Management ALL Client</h1>

      <!-- PROFILE -->
      <div class="relative">
        <button onclick="toggleProfileMenu()"
          class="flex items-center gap-2 bg-white dark:bg-gray-800 px-3 py-2 rounded shadow">

          <div class="w-8 h-8 bg-blue-500 text-white flex items-center justify-center rounded-full">
            <span id="profileInitial">A</span>
          </div>

          <span id="profileEmail" class="text-sm dark:text-white"></span>
        </button>

        <!-- DROPDOWN -->
        <div id="profileMenu"
          class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded shadow p-2 space-y-2">

          <p class="text-xs text-gray-400 px-2">Theme</p>

          <button onclick="setTheme('light')"
            class="w-full text-left px-2 py-1 rounded hover:bg-gray-100 dark:hover:bg-gray-700">
            ☀️ Light
          </button>

          <button onclick="setTheme('dark')"
            class="w-full text-left px-2 py-1 rounded hover:bg-gray-100 dark:hover:bg-gray-700">
            🌙 Dark
          </button>

          <button onclick="setTheme('system')"
            class="w-full text-left px-2 py-1 rounded hover:bg-gray-100 dark:hover:bg-gray-700">
            💻 System
          </button>

          <hr class="my-1 border-gray-200 dark:border-gray-700">

          <button onclick="logout()"
            class="w-full text-left px-2 py-1 text-red-500 hover:bg-red-50 dark:hover:bg-red-900 rounded">
            Logout
          </button>

        </div>
      </div>
    </div>

    <!-- FILTER -->
<div class="flex gap-2 mb-4">
  <input id="search" placeholder="Search Template / Client / Sender"
    class="border p-2 rounded w-64">

  <select id="filterStatus" class="border p-2 rounded">
    <option value="">All Status</option>
    <option value="pending">Pending</option>
    <option value="approved">Approved</option>
    <option value="rejected">Rejected</option>
  </select>

  <button onclick="window.location.reload()"
  class="bg-blue-500 text-white px-3 py-2 rounded">
  Refresh
</button>
</div>

<!-- TABLE -->
<table class="w-full bg-white shadow rounded overflow-hidden">
  <thead class="bg-gray-200 text-left">
    <tr>
      <th class="p-3">Client</th>
      <th class="p-3">Name</th>
      <th class="p-3">Category</th>
      <th class="p-3">Sender</th>
      <th class="p-3">Status</th>
      <th class="p-3">Created</th>
      <th class="p-3 text-center">Action</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

    
  <div class="flex justify-between items-center mt-4">

  <!-- LEFT: LIMIT + INFO -->
  <div class="flex items-center gap-3">

    <select id="limit" class="border p-2 rounded">
      <option value="10">10</option>
      <option value="25">25</option>
      <option value="50">50</option>
    </select>

    <!-- 🔥 TAMBAHAN -->
    <span id="templateInfo" class="text-sm text-gray-500"></span>

  </div>

  <!-- RIGHT: PAGINATION -->
  <div id="pagination" class="flex gap-1"></div>

</div>
    
<!-- MODAL DETAIL -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 flex justify-center items-center">
  <div class="bg-white p-6 rounded w-[400px]">
    <h2 class="text-lg font-bold mb-2">Template Detail</h2>

    <div id="detailBox" class="text-sm mb-4"></div>

    <button onclick="closeTemplateModal()"
      class="bg-gray-400 text-white px-3 py-1 rounded w-full">
      Close
    </button>
  </div>
</div>

<!-- MODAL EDIT -->
<div id="editModal"
  class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50"
  onclick="closeEditModal()">

  <div onclick="event.stopPropagation()"
    class="bg-white p-6 rounded w-[400px] shadow-lg">

    <h2 class="text-lg font-bold mb-3">Edit Template</h2>

    <!-- DROPDOWN CATEGORY -->
    <select id="edit_category"
      class="w-full p-2 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">

      <option value="">-- Pilih Category --</option>
      <option value="MARKETING">Marketing</option>
      <option value="UTILITY">Utility</option>

    </select>

    <div class="flex gap-2">
      <button onclick="closeEditModal()"
        class="bg-gray-400 hover:bg-gray-500 text-white px-3 py-1 rounded w-full">
        Batal
      </button>

      <button onclick="submitEdit()"
        class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded w-full">
        Save
      </button>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="fixed bottom-3 left-4 text-[11px] text-gray-400 dark:text-gray-300 bg-white/80 dark:bg-gray-800/80 backdrop-blur px-3 py-1 rounded-lg shadow z-40">
2026 © IntegriHub v1.0.0
</div>

    
<script src="template.js"></script>
<script src="superadmin-app.js"></script>

</body>
</html>
