<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Login</title>
  <link rel="icon" href="https://cdn.phototourl.com/free/2026-05-02-cd291600-7ecf-4524-9d37-7de268482d4e.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body 
  class="h-screen overflow-hidden flex items-center justify-center relative bg-cover bg-center"
  style="background-image: url('https://cdn.phototourl.com/free/2026-06-10-47898f95-a81a-4993-b770-a17a2713706a.png');"
>



<!-- LOGO KIRI ATAS -->
<img src="https://cdn.phototourl.com/free/2026-05-02-ab097072-d91f-49c4-a043-141626c5b8a8.png" 
     class="absolute top-10 left-12 h-20 z-10">

<!-- GLOW EFFECT -->
<div class="absolute w-[400px] h-[400px] bg-blue-500/20 blur-3xl rounded-full top-0 left-0"></div>
<div class="absolute w-[400px] h-[400px] bg-green-500/20 blur-3xl rounded-full bottom-0 right-0"></div>

<!-- CARD LOGIN -->
<div class="bg-white/90 backdrop-blur p-8 rounded-2xl shadow-xl w-[350px] z-10 relative">

  <!-- TEXT -->
  <h1 class="text-xl font-semibold text-center text-gray-700 mb-1">
    Selamat datang di layanan
  </h1>

  <h2 class="text-lg font-bold text-center text-green-600 mb-6">
    CRM IntegriHub
  </h2>

  <!-- INPUT -->
  <input id="email" placeholder="Email"
    class="w-full p-2 border rounded mb-3 focus:outline-none focus:ring-2 focus:ring-green-400">

  <input id="password" type="password" placeholder="Password"
    class="w-full p-2 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-green-400">

  <!-- BUTTON -->
  <button onclick="login()"
    class="bg-green-500 hover:bg-green-600 transition text-white w-full py-2 rounded-lg">
    Login
  </button>

</div>

<script>
const API = window.location.hostname.includes("staging") || 
            window.location.hostname.includes("pages.dev") || 
            window.location.hostname.includes("localhost") || 
            window.location.hostname.includes("127.0.0.1")
  ? "https://api-staging.crm.integrihub.my.id"
  : "https://api-crm.integrihub.my.id";

// 🔥 BISA TEKAN ENTER
document.addEventListener("keydown", function(event) {
  if (event.key === "Enter") login();
});

async function login(){
  const emailInput = document.getElementById("email").value;
  const passwordInput = document.getElementById("password").value;
  const btn = document.querySelector("button");

  if (!emailInput || !passwordInput) return alert("⚠️ Isi email dan password!");

  // 🔥 ANTI SPAM KLIK
  btn.innerText = "⏳ Memproses...";
  btn.disabled = true;

  try {
    const res = await fetch(API + "/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: emailInput, password: passwordInput })
    });

    if (!res.ok) {
      alert("❌ Email atau password salah");
      btn.innerText = "Login";
      btn.disabled = false;
      return;
    }

    localStorage.setItem("email", emailInput);

    // 🔥 NOTIFIKASI SMOOTH UI (GANTI ALERT)
    const toast = document.createElement("div");
    toast.className = "fixed top-10 right-10 bg-white/20 backdrop-blur border border-white/40 text-white px-6 py-3 rounded-lg shadow-2xl transition-all duration-500 transform translate-y-[-20px] opacity-0";
    toast.innerHTML = "✅ OTP berhasil dikirim ke email Anda!";
    document.body.appendChild(toast);
    
    setTimeout(() => {
      toast.classList.remove("translate-y-[-20px]", "opacity-0");
      toast.classList.add("translate-y-0", "opacity-100");
    }, 10);

    // 🔥 REDIRECT SETELAH JEDA (Biar animasinya terlihat)
    setTimeout(() => { window.location = "otp.html"; }, 1500);

  } catch (err) {
    alert("❌ Server error / CORS");
    btn.innerText = "Login";
    btn.disabled = false;
  }
}
</script>

<div class="fixed bottom-2 right-4 text-xs text-gray-300 z-10">
  2026 © Application designed and developed by IntegriHub v1.0.0
</div>

</body>
</html>
